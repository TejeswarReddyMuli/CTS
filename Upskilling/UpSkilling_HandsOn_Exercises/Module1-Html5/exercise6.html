<!DOCTYPE html>
<html>
<head>
<script>

function validatePhone(){
    alert("Phone number validated");
}

function showFee(){
    let fee=document.getElementById("event").value;
    document.getElementById("fee").innerHTML=
    "Fee: ₹"+fee;
}

function submitForm(){
    alert("Feedback Submitted");
}

function enlarge(img){
    img.style.width="300px";
}

function countChars(){
    let count=document.getElementById("feedback").value.length;
    document.getElementById("counter").innerHTML=
    count+" Characters";
}

</script>
</head>
<body>

Phone:
<input type="text" onblur="validatePhone()">

<br><br>

<select id="event" onchange="showFee()">
<option value="100">Music</option>
<option value="200">Sports</option>
</select>

<p id="fee"></p>

<img src="event1.jpg"
     width="150"
     ondblclick="enlarge(this)">

<br><br>

<textarea id="feedback"
          onkeyup="countChars()"></textarea>

<p id="counter">0 Characters</p>

<button onclick="submitForm()">
Submit
</button>

</body>
</html>
