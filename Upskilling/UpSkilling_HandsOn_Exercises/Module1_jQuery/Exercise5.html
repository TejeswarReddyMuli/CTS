<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>jQuery Events Exercise</title> 
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> 
    <style> 
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: flex-start; 
        } 
         
        /* A div with id #colorBox */ 
        #colorBox { 
            width: 200px; 
            height: 200px; 
            border: 2px solid #333; 
            background-color: white; /* Initial color */ 
            transition: background-color 0.3s ease; /* Smooth transition */ 
            border-radius: 8px; 
        } 
 
        /* A button with id #colorBtn */ 
        #colorBtn { 
            padding: 10px 15px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #34495e; 
            color: white; 
            border: none; 
            border-radius: 4px; 
        } 
         
        #colorBtn:hover { 
            background-color: #2c3e50; 
        } 
    </style> 
</head> 
<body> 
 
    <button id="colorBtn">Click / Double-Click Me</button> 
    <div id="colorBox"></div> 
 
    <script> 
        $(document).ready(function() { 
             
            // 1. Single click event: Change background color to red 
            $("#colorBtn").click(function() { 
                $("#colorBox").css("background-color", "red"); 
            }); 
 
            // 2. Double click event: Change background color back to white 
            $("#colorBtn").dblclick(function() { 
                $("#colorBox").css("background-color", "white"); 
            }); 
 
        }); 
    </script> 
 
</body> 
</html>
